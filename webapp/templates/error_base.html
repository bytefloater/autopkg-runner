{% load static %}<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Error{% endblock %} — AutoPkg Runner</title>
  <link rel="stylesheet" href="{% static 'css/tailwind.css' %}">
</head>
<body class="h-full bg-gray-50 flex items-center justify-center">
  <div class="text-center px-6">
    <p class="text-6xl font-bold text-gray-300 mb-4">{% block code %}{% endblock %}</p>
    <h1 class="text-2xl font-semibold text-gray-800 mb-2">{% block heading %}{% endblock %}</h1>
    <p class="text-gray-500 {% block body_margin %}mb-8{% endblock %}">{% block body %}{% endblock %}</p>
    {% block action %}
    <a href="/" class="inline-block px-5 py-2.5 rounded-lg bg-blue-600 text-white text-sm font-medium hover:bg-blue-700 transition-colors">Go to Dashboard</a>
    {% endblock %}
  </div>
</body>
</html>
