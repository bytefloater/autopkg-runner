{% load static %}
<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — AutoPkg Runner</title>
  <link rel="icon" type="image/x-icon" href="{% static 'webapp/icons/favicon.ico' %}">

  {# Anti-FOUC: apply saved theme before first paint #}
  <script>
    (function(){
      var t=localStorage.getItem('aptheme')||'auto';
      if(t==='dark'||(t==='auto'&&window.matchMedia('(prefers-color-scheme:dark)').matches))
        document.documentElement.classList.add('dark');
    })();
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="h-full bg-gray-50 dark:bg-slate-950 flex items-center justify-center">
  <div class="w-full max-w-sm px-4 mt-6">
    <div class="flex flex-col items-center mb-8">
      <img src="{% static 'webapp/icons/icon-192.png' %}" alt="AutoPkg Runner" class="w-12 h-12 rounded-xl mb-4 shadow-lg block">
      <h1 class="text-2xl font-bold text-gray-900 dark:text-white">AutoPkg Runner</h1>
      <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">Sign in to continue</p>
    </div>

    <div class="bg-white dark:bg-slate-900 rounded-2xl shadow-sm border border-gray-200 dark:border-slate-800 p-6">
      {% if form.errors %}
      <div class="mb-4 px-3 py-2.5 rounded-lg bg-red-50 dark:bg-red-950/50 border border-red-200 dark:border-red-800 text-sm text-red-700 dark:text-red-300">
        Invalid username or password.
      </div>
      {% endif %}

      <form method="post" class="space-y-4">
        <div>
          <label for="id_username" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Username</label>
          <input type="text" name="username" id="id_username" autocomplete="username" required autofocus
                 class="w-full px-3 py-2.5 rounded-lg border border-gray-300 dark:border-slate-700
                        bg-white dark:bg-slate-800 text-gray-900 dark:text-white text-sm
                        focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                        placeholder-gray-400 transition-colors">
        </div>
        <div>
          <label for="id_password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1.5">Password</label>
          <input type="password" name="password" id="id_password" autocomplete="current-password" required
                 class="w-full px-3 py-2.5 rounded-lg border border-gray-300 dark:border-slate-700
                        bg-white dark:bg-slate-800 text-gray-900 dark:text-white text-sm
                        focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent
                        placeholder-gray-400 transition-colors">
        </div>
        <button type="submit"
                class="w-full py-2.5 px-4 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white text-sm font-semibold rounded-lg transition-colors shadow-sm">
          Sign in
        </button>
        {% csrf_token %}
        <input type="hidden" name="next" value="{{ next }}">
      </form>
    </div>
  </div>
</body>
</html>
